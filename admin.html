<header>
<div class="logo">
<span>DC</span> ADMIN
</div>
</header>

<div class="admin-wrap">

<div id="loginScreen" class="login-box">
<h1>Admin Login</h1>

<input type="password" id="passwordInput" placeholder="Enter admin password">

<button onclick="login()">Enter Admin</button>

<div id="loginStatus" class="status"></div>
</div>

<div id="dashboard" class="hidden">

<div class="topbar">
<h1>Story Approval Dashboard</h1>
<div class="count" id="storyCount"></div>
</div>

<div id="storyGrid" class="story-grid"></div>

</div>

</div>

<script>
const ADMIN_URL = "https://egxkcdhrappdjzskwddq.supabase.co/functions/v1/admin-stories";

let ADMIN_SECRET = "";

async function login(){

ADMIN_SECRET = document.getElementById("passwordInput").value;

const status = document.getElementById("loginStatus");

try{

const response = await fetch(ADMIN_URL,{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-admin-secret":ADMIN_SECRET
},
body:JSON.stringify({
action:"list"
})
});

const data = await response.json();

if(!response.ok){
status.innerHTML = data.error || "Connection failed";
return;
}

document.getElementById("loginScreen").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

renderStories(data.stories || []);

}catch(err){
status.innerHTML = "Connection failed";
console.error(err);
}
}

function renderStories(stories){

document.getElementById("storyCount").innerHTML =
stories.length + " stories loaded";

const grid = document.getElementById("storyGrid");

if(!stories.length){
grid.innerHTML = "<p>No stories found.</p>";
return;
}

grid.innerHTML = stories.map(story=>`

<div class="story-card">

<img src="${story.image_url || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?q=80&w=1200'}">

<div class="story-content">

<div class="badge">${escapeHtml(story.category || "Disturbing")}</div>

<h2>${escapeHtml(story.title || "Untitled")}</h2>

<div class="meta">
Score: ${story.disturbing_score || "8.0"}/10
</div>

<p>${escapeHtml(story.summary || "")}</p>

<label>DNN Angle</label>

<textarea id="angle-${story.id}">${escapeHtml(
story.dnn_angle || story.why_disturbing || ""
)}</textarea>

<div class="actions">

<button class="approve"
onclick="approveStory('${story.id}')">
Approve
</button>

<button class="reject"
onclick="rejectStory('${story.id}')">
Reject
</button>

<button class="delete"
onclick="deleteStory('${story.id}')">
Delete
</button>

</div>

</div>
</div>

`).join("");
}

async function approveStory(id){

const angle =
document.getElementById(`angle-${id}`).value;

await updateStory(id,{
approved:true,
rejected:false,
dnn_angle:angle
});
}

async function rejectStory(id){

await updateStory(id,{
approved:false,
rejected:true
});
}

async function deleteStory(id){

if(!confirm("Delete this story?")) return;

const response = await fetch(ADMIN_URL,{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-admin-secret":ADMIN_SECRET
},
body:JSON.stringify({
action:"delete",
id
})
});

if(response.ok){
location.reload();
}
}

async function updateStory(id,updates){

const response = await fetch(ADMIN_URL,{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-admin-secret":ADMIN_SECRET
},
body:JSON.stringify({
action:"update",
id,
updates
})
});

if(response.ok){
location.reload();
}
}

function escapeHtml(value){
return String(value || "")
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;")
.replaceAll('"',"&quot;")
.replaceAll("'","&#039;");
}
</script>

</body>
</html>
